name: Generate message

# Once daily each morning, tuned to Singapore time (UTC+8). Adjust the cron time
# to your timezone. GitHub schedules run in UTC.
on:
  schedule:
    - cron: "0 23 * * *" # 07:00 SGT  -> morning note + doodle prompt + nuggets
  workflow_dispatch:

permissions:
  contents: write # commit data/messages.json, data/prompts.json, data/nuggets.json
  models: read # call GitHub Models

concurrency:
  group: generate-message
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate message
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-message.mjs

      - name: Generate doodle prompt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-prompt.mjs

      - name: Generate nuggets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-nuggets.mjs

      - name: Rebuild doodle manifest
        run: node scripts/build-doodle-manifest.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/messages.json data/prompts.json data/nuggets.json doodles/index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily note for $(date -u +%F)"
            git push
          fi
