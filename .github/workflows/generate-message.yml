name: Generate message

# Once daily each morning, tuned to Singapore time (UTC+8). GitHub schedules run
# in UTC. IMPORTANT: GitHub only *queues* scheduled runs at the cron time — they
# commonly start 30-75 min late (worst on the top of the hour, the busiest slot).
# So to land the note before 06:00 SGT we trigger ~1h40m early and off-the-hour:
# 20:20 UTC nominal -> job starts ~21:00-21:35 UTC -> commits ~04:20-05:35 SGT,
# leaving margin for GitHub Pages to redeploy before 06:00 SGT. If it drifts late
# again, move the time earlier still. (Adjust for your timezone.)
on:
  schedule:
    - cron: "20 20 * * *" # ~04:20 SGT nominal (early, to beat scheduler delay)
  workflow_dispatch:

permissions:
  contents: write # commit data/messages.json, data/prompts.json, data/nuggets.json
  models: read # call GitHub Models

concurrency:
  group: generate-message
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate message
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-message.mjs

      - name: Generate doodle prompt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-prompt.mjs

      - name: Generate nuggets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-nuggets.mjs

      - name: Rebuild doodle manifest
        run: node scripts/build-doodle-manifest.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/messages.json data/prompts.json data/nuggets.json data/nugget-trend-pool.json doodles/index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily note for $(date -u +%F)"
            git push
          fi
