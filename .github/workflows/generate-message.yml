name: Generate message

# Twice daily, tuned to Singapore time (UTC+8). Adjust the cron times to your
# timezone. GitHub schedules run in UTC.
on:
  schedule:
    - cron: "0 23 * * *" # 07:00 SGT  -> morning / lighthearted
    - cron: "0 11 * * *" # 19:00 SGT  -> evening / reflective
  workflow_dispatch:
    inputs:
      slot:
        description: "Which note to generate"
        default: "am"
        type: choice
        options: [am, pm]

permissions:
  contents: write # commit data/messages.json
  models: read # call GitHub Models

concurrency:
  group: generate-message
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ github.event.inputs.slot }}"
          elif [ "${{ github.event.schedule }}" = "0 23 * * *" ]; then
            SLOT="am"
          else
            SLOT="pm"
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "Generating slot: $SLOT"

      - name: Generate message
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-message.mjs --slot=${{ steps.slot.outputs.slot }}

      - name: Generate doodle prompt
        if: steps.slot.outputs.slot == 'am'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-prompt.mjs

      - name: Rebuild doodle manifest
        run: node scripts/build-doodle-manifest.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/messages.json data/prompts.json doodles/index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: ${{ steps.slot.outputs.slot }} note for $(date -u +%F)"
            git push
          fi
