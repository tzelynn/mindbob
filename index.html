<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>mindbob</title>
  <meta name="description" content="A calming feel-good note, refreshed each morning, plus daily nuggets." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#f4efe6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="mindbob" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" href="./icons/icon-192.png" />

  <link rel="preload" href="./assets/fonts/Eggi-Regular.ttf" as="font" type="font/ttf" crossorigin />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="app" class="app" data-mode="message">
    <!-- Minimal top bar -->
    <header class="topbar">
      <span class="brand">mindbob</span>
      <div class="mode-menu" id="modeMenu">
        <button id="modeMenuBtn" class="mode-menu-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Choose mode">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" />
          </svg>
          <span id="modeMenuLabel">message</span>
        </button>
        <!-- items built in JS from MODES (js/modes.js) -->
        <div id="modeMenuList" class="mode-menu-list" role="menu" aria-label="Display mode" hidden></div>
      </div>
      <button id="notifyBell" class="notify-bell" type="button" aria-pressed="false" aria-label="Notify me of new notes" title="Notify me of new notes" hidden>🔔</button>
    </header>

    <!-- Stage: stacked layers -->
    <section class="stage" id="stage">
      <!-- daily doodle prompt (doodle mode only) -->
      <div id="doodlePrompt" class="doodle-prompt" aria-hidden="true">prompt: <strong id="doodleWord"></strong></div>

      <!-- bounded drawing canvas (doodle mode only) -->
      <canvas id="drawCanvas" class="layer-canvas" aria-hidden="true"></canvas>

      <!-- doodle (message mode) -->
      <div id="doodleLayer" class="layer layer-doodle" aria-hidden="true"></div>

      <!-- the message (message mode) -->
      <div id="messageEl" class="layer layer-message">
        <p id="messageText" class="message-text">…</p>
      </div>

      <!-- the nuggets (nuggets mode) -->
      <div id="nuggetsEl" class="layer layer-nuggets">
        <article class="nugget nugget-fact">
          <h2 class="nugget-label">fun fact</h2>
          <p class="nugget-text" id="nuggetFact"></p>
        </article>
        <article class="nugget nugget-trend">
          <h2 class="nugget-label">tech trend</h2>
          <p class="nugget-text" id="nuggetTrend"></p>
        </article>
      </div>

      <!-- the mood tracker (mood mode) -->
      <div id="moodEl" class="layer layer-mood" aria-hidden="true">
        <div id="moodLog" class="mood-log"></div>
        <div id="moodZoom" class="mood-zoom"></div>
        <div id="moodGrid" class="mood-grid"></div>
      </div>

      <!-- the brain dump (brain mode) -->
      <div id="brainEl" class="layer layer-brain" aria-hidden="true">
        <article class="brain-card">
          <h2 class="brain-label">monthly</h2>
          <div class="brain-body" id="brainMonthly"></div>
        </article>
        <article class="brain-card">
          <h2 class="brain-label">to-do</h2>
          <div class="brain-body" id="brainAdhoc"></div>
        </article>
      </div>

      <!-- past-doodles gallery overlay (doodle mode, opened from the toolbar) -->
      <div id="galleryOverlay" class="gallery-overlay" role="dialog" aria-label="Past doodles" hidden>
        <div class="gallery-head">
          <h2 class="gallery-title">past doodles</h2>
          <button id="galleryClose" class="tool-btn" type="button">close</button>
        </div>
        <div id="galleryBody" class="gallery-body"></div>
      </div>
    </section>

    <!-- Toolbar (doodle mode only) -->
    <footer class="toolbar" id="toolbar" hidden>
      <div class="tool-group" role="group" aria-label="Tools">
        <button id="toolPencil" class="tool-btn is-active" title="Draw" aria-pressed="true">pencil</button>
        <button id="toolEraser" class="tool-btn" title="Erase" aria-pressed="false">eraser</button>
      </div>
      <div id="swatches" class="swatches" aria-label="Pencil colours"></div>
      <div class="tool-group">
        <button id="toolUndo" class="tool-btn" title="Undo last action" disabled>undo</button>
        <button id="toolClear" class="tool-btn" title="Clear drawing">clear</button>
        <button id="toolSave" class="tool-btn" title="Save as image">save</button>
        <button id="toolGallery" class="tool-btn" title="Past doodles">gallery</button>
      </div>
    </footer>

    <p id="status" class="status" role="status" aria-live="polite"></p>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
